name: .NET Environment Setup
description: |
  Setup .NET SDK with caching, optional workloads, and optional version stamping
  via either Nerdbank.GitVersioning (`versioning-tool: nbgv`) or MinVer
  (`versioning-tool: minver`). Output shape is unified so callers can swap tools
  without rewriting downstream steps.

inputs:
  dotnet-versions:
    description: 'Newline-separated list of .NET SDK versions'
    required: true
  src-folder:
    description: 'Folder containing the solution'
    required: false
    default: 'src'
  solution-file:
    description: 'Solution file relative to src-folder'
    required: false
    default: ''
  install-workloads:
    description: 'Run dotnet workload restore'
    required: false
    default: 'false'
  versioning-tool:
    description: 'Which versioning tool to run: nbgv | minver | none. Takes precedence over the deprecated use-nbgv input when set.'
    required: false
    default: ''
  use-nbgv:
    description: 'DEPRECATED — use versioning-tool instead. true → nbgv, false → none. Ignored when versioning-tool is set.'
    required: false
    default: 'true'
  minver-tag-prefix:
    description: 'Tag prefix for MinVer (default v).'
    required: false
    default: 'v'
  minver-minimum-major-minor:
    description: 'MinVer floor major.minor when no tag is reachable (e.g. "1.0"). Empty leaves MinVer at 0.0.'
    required: false
    default: ''
  minver-default-pre-release-identifiers:
    description: 'MinVer pre-release identifiers for height-only builds.'
    required: false
    default: 'alpha.0'
  minver-auto-increment:
    description: 'MinVer auto-increment segment (major|minor|patch).'
    required: false
    default: 'minor'

outputs:
  nbgv-semver2:
    description: 'SemVer2 version string from the chosen versioning tool (empty when versioning is disabled). Name kept for backward compatibility — also produced when versioning-tool=minver.'
    value: ${{ steps.merge-outputs.outputs.semver2 }}
  version-semver2:
    description: 'Alias for nbgv-semver2 with a tool-neutral name.'
    value: ${{ steps.merge-outputs.outputs.semver2 }}
  versioning-tool:
    description: 'The versioning tool actually run (nbgv | minver | none).'
    value: ${{ steps.resolve-tool.outputs.tool }}

runs:
  using: composite
  steps:
    - name: Resolve versioning tool
      id: resolve-tool
      shell: bash
      run: |
        TOOL="${{ inputs.versioning-tool }}"
        if [ -z "$TOOL" ]; then
          # Back-compat: fall through to the legacy boolean flag.
          if [ "${{ inputs.use-nbgv }}" = "true" ]; then
            TOOL="nbgv"
          else
            TOOL="none"
          fi
        fi
        case "$TOOL" in
          nbgv|minver|none) ;;
          *)
            echo "::error::versioning-tool must be one of: nbgv, minver, none (got '$TOOL')"
            exit 1 ;;
        esac
        echo "tool=$TOOL" >> "$GITHUB_OUTPUT"
        echo "Versioning tool: $TOOL"

    - name: Setup .NET SDK with NuGet package cache
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-versions }}
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/*.csproj
          **/global.json
          **/nuget.config

    - name: Cache NuGet HTTP v3 feed responses (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v5
      with:
        path: '%LOCALAPPDATA%\NuGet\v3-cache'
        key: ${{ runner.os }}-nugetv3-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json', '**/nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-nugetv3-

    - name: Cache NuGet HTTP v3 feed responses (Unix)
      if: runner.os != 'Windows'
      uses: actions/cache@v5
      with:
        path: ~/.local/share/NuGet/v3-cache
        key: ${{ runner.os }}-nugetv3-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json', '**/nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-nugetv3-

    - name: Restore .NET Workloads
      if: inputs.install-workloads == 'true'
      shell: bash
      working-directory: ${{ inputs.src-folder }}
      run: |
        # Determine the solution/project file to pass to workload restore.
        # If explicitly provided use that, otherwise auto-detect .slnx/.sln in the working directory.
        TARGET="${{ inputs.solution-file }}"
        if [ -z "$TARGET" ]; then
          TARGET=$(find . -maxdepth 1 \( -name '*.slnx' -o -name '*.sln' \) -print -quit)
        fi
        if [ -n "$TARGET" ]; then
          dotnet workload restore "$TARGET" --from-previous-sdk --skip-manifest-update
        else
          dotnet workload restore --from-previous-sdk --skip-manifest-update
        fi

    - name: Stamp version with Nerdbank.GitVersioning
      if: steps.resolve-tool.outputs.tool == 'nbgv'
      id: nbgv
      uses: reactiveui/actions-common/.github/actions/nbgv@main

    - name: Stamp version with MinVer
      if: steps.resolve-tool.outputs.tool == 'minver'
      id: minver
      uses: reactiveui/actions-common/.github/actions/minver@main
      with:
        tag-prefix: ${{ inputs.minver-tag-prefix }}
        minimum-major-minor: ${{ inputs.minver-minimum-major-minor }}
        default-pre-release-identifiers: ${{ inputs.minver-default-pre-release-identifiers }}
        auto-increment: ${{ inputs.minver-auto-increment }}

    - name: Merge versioning outputs into tool-neutral output
      id: merge-outputs
      shell: bash
      run: |
        case "${{ steps.resolve-tool.outputs.tool }}" in
          nbgv)   SEMVER2='${{ steps.nbgv.outputs.SemVer2 }}' ;;
          minver) SEMVER2='${{ steps.minver.outputs.SemVer2 }}' ;;
          *)      SEMVER2='' ;;
        esac
        echo "semver2=$SEMVER2" >> "$GITHUB_OUTPUT"

name: Common GitHub release creation workflow

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
        description: 'Version string used for the release title and release notes heading'

      tag:
        type: string
        default: ''
        description: 'Git tag to attach the release to (e.g. v2.4.0). Defaults to version when empty (back-compat).'

      artifactName:
        type: string
        default: 'signed-nuget'
        description: 'Name of the artifact containing .nupkg files to attach to the release'

jobs:
  # ============================
  # CREATE GITHUB RELEASE (Linux)
  # ============================
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifactName }}
          path: ./signed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Install GitReleaseNoteGenerator
        run: dotnet tool install -g GitReleaseNoteGenerator

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-release-notes --release-version "${{ inputs.version }}" --output-file release-notes.md

      # Creates the tag too: workflow-common-release.yml no longer pushes it up
      # front (so a failed build/sign/publish leaves no orphan tag). --target pins
      # the new tag to the exact commit this run built.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag != '' && inputs.tag || inputs.version }}" --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "${{ inputs.version }}" --notes-file release-notes.md ./signed/*.nupkg

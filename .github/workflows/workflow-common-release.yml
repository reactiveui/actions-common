name: Common .NET build and release workflow

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      configuration:
        type: string
        default: 'Release'
        description: 'Build configuration'

      dotnetVersions:
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
        description: 'Newline-separated list of .NET SDKs'

      solutionFile:
        type: string
        description: 'Solution file relative to srcFolder'

      srcFolder:
        type: string
        default: 'src'
        description: 'Folder containing the solution'

      useNBGV:
        type: boolean
        default: true
        description: 'DEPRECATED — pass versioningTool instead. true → nbgv, false → none. Ignored when versioningTool is set.'

      versioningTool:
        type: string
        default: ''
        description: 'Versioning tool to run: nbgv | minver | none. Takes precedence over useNBGV when set.'

      minverMinimumMajorMinor:
        type: string
        default: ''
        description: 'When versioningTool=minver: floor major.minor when no tag is reachable.'

      minverTagPrefix:
        type: string
        default: 'v'
        description: 'When versioningTool=minver: git tag prefix MinVer expects.'

      minverAutoIncrement:
        type: string
        default: 'minor'
        description: 'When versioningTool=minver: auto-increment segment (major|minor|patch).'

      minverDefaultPreReleaseIdentifiers:
        type: string
        default: 'alpha.0'
        description: 'When versioningTool=minver: pre-release identifier(s) for height-only builds.'

      installWorkloads:
        type: boolean
        default: false
        description: 'Run dotnet workload restore'

      useUNO:
        type: boolean
        default: false
        description: 'Enable UNO-specific msbuild/pack flow (Windows only)'

      signingTimestampUrl:
        type: string
        default: 'http://time.certum.pl'
        description: 'RFC3161 timestamp server URL used when signing NuGet packages'

      bump:
        type: string
        default: ''
        description: 'Release level (major|minor|patch) to cut a clean RTM version and push a tag before building. Empty = normal CI build (MinVer pre-release at HEAD, no tag).'

    outputs:
      semver2:
        description: 'SemVer2 version string from the chosen versioning tool (NBGV or MinVer).'
        value: ${{ jobs.build-sign-release.outputs.semver2 }}
      tag:
        description: 'Tag pushed for a bump release (e.g. v2.4.0). Empty for CI builds.'
        value: ${{ jobs.build-sign-release.outputs.tag }}

    secrets:
      CERTUM_USER_ID:
        required: true
        description: 'Certum SimplySign login username'

      CERTUM_OTP_URI:
        required: true
        description: 'Full otpauth:// URI for Certum SimplySign TOTP'

      CERTUM_CERT_FINGERPRINT:
        required: true
        description: 'SHA-256 fingerprint of the Certum code-signing certificate'

jobs:
  # ============================
  # BUILD + SIGN + RELEASE (Windows)
  # ============================
  build-sign-release:
    environment:
      name: release
    # Certum SimplySign uses virtual keycard middleware and must run on Windows.
    runs-on: windows-latest
    outputs:
      semver2: ${{ steps.environment.outputs.nbgv-semver2 }}
      tag: ${{ steps.bump.outputs.tag }}
    # Surface the Certum secrets to every step in this job so the
    # connect-certum-simplysign composite action (composite actions cannot
    # declare secret-typed inputs) and the signing step read them from env.
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      # For a bump release: compute the next clean RTM version, push the vX.Y.Z
      # tag, and export MINVERVERSIONOVERRIDE so the MinVer step below stamps it.
      # Skipped (no-op) for normal CI builds where bump is empty.
      - name: Compute version and tag
        if: inputs.bump != ''
        id: bump
        uses: reactiveui/actions-common/.github/actions/compute-version-and-tag@main
        with:
          bump: ${{ inputs.bump }}
          tag-prefix: ${{ inputs.minverTagPrefix }}

      - name: Setup .NET Environment
        id: environment
        uses: reactiveui/actions-common/.github/actions/dotnet-environment@main
        with:
          dotnet-versions: ${{ inputs.dotnetVersions }}
          src-folder: ${{ inputs.srcFolder }}
          solution-file: ${{ inputs.solutionFile }}
          install-workloads: ${{ inputs.installWorkloads }}
          use-nbgv: ${{ inputs.useNBGV }}
          versioning-tool: ${{ inputs.versioningTool }}
          minver-tag-prefix: ${{ inputs.minverTagPrefix }}
          minver-minimum-major-minor: ${{ inputs.minverMinimumMajorMinor }}
          minver-auto-increment: ${{ inputs.minverAutoIncrement }}
          minver-default-pre-release-identifiers: ${{ inputs.minverDefaultPreReleaseIdentifiers }}

      - name: Build (dotnet)
        if: inputs.useUNO == false
        uses: reactiveui/actions-common/.github/actions/dotnet-build@main
        with:
          configuration: ${{ inputs.configuration }}
          src-folder: ${{ inputs.srcFolder }}
          solution-file: ${{ inputs.solutionFile }}
          create-packages: 'false'

      - name: Build (UNO)
        if: inputs.useUNO == true
        uses: reactiveui/actions-common/.github/actions/dotnet-build-uno@main
        with:
          configuration: ${{ inputs.configuration }}
          src-folder: ${{ inputs.srcFolder }}
          solution-file: ${{ inputs.solutionFile }}

      - name: Pack NuGet packages
        shell: bash
        working-directory: ${{ inputs.srcFolder }}
        run: dotnet pack --no-restore --configuration ${{ inputs.configuration }} ${{ inputs.solutionFile }} -o "${GITHUB_WORKSPACE}/packages"

      - name: Install and connect Certum SimplySign
        uses: reactiveui/actions-common/.github/actions/connect-certum-simplysign@main

      - name: Prepare signed package output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path signed | Out-Null
          Copy-Item packages\*.nupkg signed\ -Force

      - name: Sign NuGet packages with Certum SimplySign
        shell: pwsh
        run: |
          $fingerprint = ($env:CERTUM_CERT_FINGERPRINT -replace '[^0-9a-fA-F]', '').ToUpperInvariant()

          dotnet nuget sign "signed/*.nupkg" `
            --certificate-fingerprint "$fingerprint" `
            --certificate-store-location CurrentUser `
            --certificate-store-name My `
            --hash-algorithm SHA256 `
            --timestamp-hash-algorithm SHA256 `
            --timestamper "${{ inputs.signingTimestampUrl }}" `
            --overwrite `
            --verbosity detailed

      - name: Verify signed NuGet packages
        shell: pwsh
        run: |
          dotnet nuget verify "signed/*.nupkg" --all

      - name: Upload Signed Packages
        uses: actions/upload-artifact@v7
        with:
          name: signed-nuget
          path: signed/*.nupkg
          if-no-files-found: error


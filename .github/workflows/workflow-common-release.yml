name: Common .NET build and release workflow

# packages: read is the ceiling that lets the optional sign-container job pull
# the (internal) prebuilt signer image. Reusable-workflow job permissions cannot
# exceed this workflow-level set, so every caller must also grant packages: read.
permissions:
  contents: write
  packages: read

on:
  workflow_call:
    inputs:
      configuration:
        type: string
        default: 'Release'
        description: 'Build configuration'

      dotnetVersions:
        type: string
        default: |
          8.0.x
          9.0.x
          10.0.x
        description: 'Newline-separated list of .NET SDKs'

      solutionFile:
        type: string
        description: 'Solution file relative to srcFolder'

      srcFolder:
        type: string
        default: 'src'
        description: 'Folder containing the solution'

      minverMinimumMajorMinor:
        type: string
        default: ''
        description: 'floor major.minor when no tag is reachable.'

      minverTagPrefix:
        type: string
        default: 'v'
        description: 'git tag prefix MinVer expects.'

      minverAutoIncrement:
        type: string
        default: 'minor'
        description: 'auto-increment segment (major|minor|patch).'

      minverDefaultPreReleaseIdentifiers:
        type: string
        default: 'alpha.0'
        description: 'pre-release identifier(s) for height-only builds.'

      installWorkloads:
        type: boolean
        default: false
        description: 'Run dotnet workload restore'

      useUNO:
        type: boolean
        default: false
        description: 'Enable UNO-specific msbuild/pack flow (Windows only)'

      signingTimestampUrl:
        type: string
        default: 'http://time.certum.pl'
        description: 'RFC3161 timestamp server URL used when signing NuGet packages'

      bump:
        type: string
        default: ''
        description: 'Release level (major|minor|patch) to cut a clean RTM version and push a tag before building. Empty = normal CI build (MinVer pre-release at HEAD, no tag). Mutually exclusive with versionOverride.'

      versionOverride:
        type: string
        default: ''
        description: 'Exact version to stamp (e.g. "11.4.13"), bypassing the bump-from-latest-tag math and the MinVer git walk. Use for an out-of-sequence / backport release whose number does not follow from the newest tag (e.g. shipping an 11.4.x patch while main is on 12.x). The release tag becomes <minverTagPrefix><versionOverride>. Mutually exclusive with bump.'

      buildOs:
        type: string
        default: 'windows-latest'
        description: 'Runner for the build/pack job (e.g. windows-latest, ubuntu-latest). Certum signing always runs on Linux regardless. Defaults to windows-latest because several projects have Windows-specific build logic.'

      ref:
        type: string
        default: ''
        description: 'Git ref (branch, tag, or SHA) to build/pack. Empty = the ref that triggered the run (normally the default branch). Use this to re-release historical source (e.g. a tag) with the current signing pipeline.'

    outputs:
      semver2:
        description: 'MinVer SemVer2 version string.'
        value: ${{ jobs.build.outputs.semver2 }}
      tag:
        description: 'Tag pushed for a bump release (e.g. v2.4.0). Empty for CI builds.'
        value: ${{ jobs.build.outputs.tag }}
      sourceSha:
        description: 'Resolved commit SHA that was actually built (honors the ref input). Pass to workflow-common-create-release as target so the new release tag points at the built commit.'
        value: ${{ jobs.build.outputs.sourceSha }}

    secrets:
      CERTUM_USER_ID:
        required: true
        description: 'Certum SimplySign login username'

      CERTUM_OTP_URI:
        required: true
        description: 'Full otpauth:// URI for Certum SimplySign TOTP'

      CERTUM_CERT_FINGERPRINT:
        required: true
        description: 'SHA-256 fingerprint of the Certum code-signing certificate'

jobs:
  # ============================
  # BUILD + PACK (configurable OS — default Windows)
  # ============================
  build:
    environment:
      name: release
    # Default Windows because several projects have Windows-specific build logic;
    # callers can override with buildOs. Signing happens on Linux in the next job.
    runs-on: ${{ inputs.buildOs }}
    outputs:
      semver2: ${{ steps.environment.outputs.nbgv-semver2 }}
      tag: ${{ steps.tagname.outputs.tag }}
      sourceSha: ${{ steps.sourcesha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Empty ref => checkout's default (the triggering ref). A branch/tag/SHA
          # here re-releases historical source with the current signing pipeline.
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          lfs: true

      - name: Resolve built commit SHA
        id: sourcesha
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # bump (compute next version from the latest tag) and versionOverride (stamp
      # an exact version) are two different ways to pick the release number; setting
      # both is ambiguous, so fail fast.
      - name: Validate version inputs
        if: inputs.bump != '' && inputs.versionOverride != ''
        shell: bash
        run: |
          echo "::error::'bump' and 'versionOverride' are mutually exclusive — set exactly one."
          exit 1

      # For a bump release: compute the next clean RTM version, push the vX.Y.Z
      # tag, and export MINVERVERSIONOVERRIDE so the MinVer step below stamps it.
      # Skipped (no-op) for normal CI builds where bump is empty.
      # Compute the version + export MINVERVERSIONOVERRIDE for build/pack, but DON'T
      # create the tag yet — the tag is pushed by create-release at the end, so a
      # failed build/sign/publish never leaves an orphan tag.
      - name: Compute version and tag
        if: inputs.bump != '' && inputs.versionOverride == ''
        id: bump
        uses: reactiveui/actions-common/.github/actions/compute-version-and-tag@main
        with:
          bump: ${{ inputs.bump }}
          tag-prefix: ${{ inputs.minverTagPrefix }}
          push-tag: 'false'

      # Resolve the tag the GitHub release will create at the end. The override
      # path forms <prefix><versionOverride> and fails fast if it already exists
      # (the bump path does its own existence check inside compute-version-and-tag).
      - name: Resolve release tag
        id: tagname
        shell: bash
        env:
          BUMP_TAG: ${{ steps.bump.outputs.tag }}
          VERSION_OVERRIDE: ${{ inputs.versionOverride }}
          TAG_PREFIX: ${{ inputs.minverTagPrefix }}
        run: |
          set -euo pipefail
          if [ -n "$VERSION_OVERRIDE" ]; then
            TAG="${TAG_PREFIX}${VERSION_OVERRIDE}"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "::error::Tag ${TAG} already exists. Refusing to re-release an existing version."
              exit 1
            fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${BUMP_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET Environment
        id: environment
        uses: reactiveui/actions-common/.github/actions/dotnet-environment@main
        with:
          dotnet-versions: ${{ inputs.dotnetVersions }}
          src-folder: ${{ inputs.srcFolder }}
          solution-file: ${{ inputs.solutionFile }}
          install-workloads: ${{ inputs.installWorkloads }}
          minver-tag-prefix: ${{ inputs.minverTagPrefix }}
          minver-minimum-major-minor: ${{ inputs.minverMinimumMajorMinor }}
          minver-auto-increment: ${{ inputs.minverAutoIncrement }}
          minver-default-pre-release-identifiers: ${{ inputs.minverDefaultPreReleaseIdentifiers }}
          minver-version-override: ${{ inputs.versionOverride }}

      - name: Build (dotnet)
        if: inputs.useUNO == false
        uses: reactiveui/actions-common/.github/actions/dotnet-build@main
        with:
          configuration: ${{ inputs.configuration }}
          src-folder: ${{ inputs.srcFolder }}
          solution-file: ${{ inputs.solutionFile }}
          create-packages: 'false'

      - name: Build (UNO)
        if: inputs.useUNO == true
        uses: reactiveui/actions-common/.github/actions/dotnet-build-uno@main
        with:
          configuration: ${{ inputs.configuration }}
          src-folder: ${{ inputs.srcFolder }}
          solution-file: ${{ inputs.solutionFile }}

      - name: Pack NuGet packages
        shell: bash
        working-directory: ${{ inputs.srcFolder }}
        run: dotnet pack --no-restore --configuration ${{ inputs.configuration }} ${{ inputs.solutionFile }} -o "${GITHUB_WORKSPACE}/packages"

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-nuget
          path: packages/*.nupkg
          if-no-files-found: error

  # ============================
  # SIGN with Certum SimplySign — runs inside the prebuilt signer container
  # (SimplySign + jsign + .NET baked in). This is the only signing path; the
  # caller must grant packages:read so the job's GITHUB_TOKEN can pull the
  # (internal) image.
  # ============================
  sign:
    needs: build
    # The workflow-level permissions (contents: write) would otherwise strip
    # packages:read from this job's token, so the GHCR image pull gets denied.
    # Override here (still capped by what the caller granted).
    permissions:
      contents: read
      packages: read
    environment:
      name: release
    # Certum SimplySign is GUI middleware with no headless API; the certum-sign
    # action drives it under Xvfb and signs with jsign over PKCS#11 — Linux only.
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/reactiveui/certum-signer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Map the Certum secrets into env so the composite action (which cannot
    # declare secret-typed inputs) can read them.
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}
    steps:
      - name: Download unsigned packages
        uses: actions/download-artifact@v8
        with:
          name: unsigned-nuget
          path: signed

      - name: Sign packages with Certum SimplySign (prebuilt image)
        uses: reactiveui/actions-common/.github/actions/certum-sign@main
        with:
          packages-glob: 'signed/*.nupkg'
          timestamp-url: ${{ inputs.signingTimestampUrl }}
          prebuilt: 'true'

      - name: Upload Signed Packages
        uses: actions/upload-artifact@v7
        with:
          name: signed-nuget
          path: signed/*.nupkg
          if-no-files-found: error

